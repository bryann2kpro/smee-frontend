name: Version Bump

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - staging

permissions:
  contents: write

jobs:
  bump-version:
    # Run only when PR is merged into main/staging.
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Bump and tag release (main)
        if: ${{ github.event.pull_request.base.ref == 'main' }}
        id: tag_main
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          TAG_PREFIX: v
          DEFAULT_BUMP: patch
          RELEASE_BRANCHES: main
          PRERELEASE: false

      - name: Bump and tag prerelease (staging)
        if: ${{ github.event.pull_request.base.ref == 'staging' }}
        id: tag_staging
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          TAG_PREFIX: v
          DEFAULT_BUMP: patch
          RELEASE_BRANCHES: main
          PRERELEASE: true
          PRERELEASE_SUFFIX: staging

      - name: Print resulting tag
        run: |
          echo "Base branch: ${{ github.event.pull_request.base.ref }}"
          echo "Main tag output: ${{ steps.tag_main.outputs.new_tag }}"
          echo "Staging tag output: ${{ steps.tag_staging.outputs.new_tag }}"