name: Deploy

on:
  push:
    tags:
      - v*
  pull_request:
    branches:
      - main
      - staging

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PROJECT_NAME: smee-frontend
      DOCKERHUB_NAMESPACE: gremoryyx

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          REF_TYPE="${GITHUB_REF_TYPE:-}"
          REF_NAME="${GITHUB_REF_NAME:-}"

          if [ "$REF_TYPE" = "tag" ] && [[ "$REF_NAME" == v* ]]; then
            VERSION="${REF_NAME#v}"
          else
            TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            if [ -z "$TAG" ]; then
              SHORT_SHA="$(git rev-parse --short=7 HEAD)"
              VERSION="0.0.0-$SHORT_SHA"
            else
              VERSION="${TAG#v}"
            fi
          fi

          IMAGE="${DOCKERHUB_NAMESPACE}/${PROJECT_NAME}"

          TAGS=""
          if [[ "$VERSION" == *"-staging" ]]; then
            STAGING_VERSION="${VERSION%-staging}"
            TAGS="${IMAGE}:staging-${STAGING_VERSION},${IMAGE}:staging-latest"
          else
            TAGS="${IMAGE}:${VERSION},${IMAGE}:latest"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Select staging build env (from secrets)
        if: ${{ github.ref_name == 'staging' || contains(steps.meta.outputs.version, '-staging') }}
        shell: bash
        env:
          VITE_API_URL_STAG: ${{ secrets.VITE_API_URL_STAG }}
          VITE_GRAPHQL_ENDPOINT_STAG: ${{ secrets.VITE_GRAPHQL_ENDPOINT_STAG }}
        run: |
          set -euo pipefail
          echo "VITE_API_URL=${VITE_API_URL_STAG}" >> "$GITHUB_ENV"
          echo "VITE_GRAPHQL_ENDPOINT=${VITE_GRAPHQL_ENDPOINT_STAG}" >> "$GITHUB_ENV"

      - name: Select production build env (from secrets)
        if: ${{ github.ref_name == 'main' || (!contains(steps.meta.outputs.version, '-staging') && github.ref_name != 'staging') }}
        shell: bash
        env:
          VITE_API_URL_PROD: ${{ secrets.VITE_API_URL_PROD }}
          VITE_GRAPHQL_ENDPOINT_PROD: ${{ secrets.VITE_GRAPHQL_ENDPOINT_PROD }}
        run: |
          set -euo pipefail
          echo "VITE_API_URL=${VITE_API_URL_PROD}" >> "$GITHUB_ENV"
          echo "VITE_GRAPHQL_ENDPOINT=${VITE_GRAPHQL_ENDPOINT_PROD}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build (and push on tag pushes)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
            VITE_GRAPHQL_ENDPOINT=${{ env.VITE_GRAPHQL_ENDPOINT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
